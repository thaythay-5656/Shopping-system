<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

    nav ul {
        background-color: aquamarine;
        width: 300px;
        height: 50vh;
        display: flex;
        flex-direction: column;
        justify-content: start;
        align-items: center;
        padding: 15px;
        border-radius: 20px;
    }

    nav ul li {
        background-color: aliceblue;
        width: 90%;
        margin-bottom: 15px;
        height: 50px;
        text-align: center;
        align-content: center;
        border-radius: 5px;
        list-style: none;
    }

    li:hover {
        background-color: rgb(210, 234, 255);
        color: white;
    }
</style>


<body>
    <title>Dashboard Page</title>

    <nav>
        <ul>
            <li>Dashboard</li>
            <li>Report</li>
            <li>Product</li>
            <li>Profile</li>
        </ul>
    </nav>

</body>

</html>
