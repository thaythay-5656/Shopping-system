<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .login-container{
      width:350px;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .login-container h2{
      text-align:center;
      margin-bottom:30px;
      color:#333;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#555;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      transition:0.3s;
    }

    .input-group input:focus{
      border-color:#4facfe;
      box-shadow:0 0 5px rgba(79,172,254,0.5);
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#4facfe;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#2196f3;
    }

    .extra-links{
      margin-top:15px;
      text-align:center;
      font-size:14px;
    }

    .extra-links a{
      text-decoration:none;
      color:#4facfe;
    }

    .extra-links a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Welcome Back</h2>

    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
      </div>

      <button class="login-btn">Login</button>

      <div class="extra-links">
        <p><a href="#">Forgot Password?</a></p>
      </div>
    </form>
  </div>

</body>
</html>
